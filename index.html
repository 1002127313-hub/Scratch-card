<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מגרדים ומגלים: מארג מזון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdf4;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: none;
        }

        .container {
            position: relative;
            width: 380px;
            height: 520px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 8px solid #22c55e;
        }

        #scratch-container {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #underlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 8px;
            text-align: center;
            user-select: none;
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
        }

        .info-box {
            margin-top: 15px;
            padding: 12px;
            background: #dcfce7;
            border-radius: 10px;
            color: #166534;
            font-weight: bold;
            text-align: center;
            max-width: 380px;
            font-size: 0.95rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #secret-code-display {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #fef08a;
            border: 2px dashed #ca8a04;
            border-radius: 8px;
            color: #854d0e;
            font-family: inherit;
            font-size: 1.3rem;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #22c55e;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <h1 class="text-3xl font-bold text-green-800 mb-2">מגרדים ומגלים!</h1>
    <p class="text-md text-green-700 mb-4">גרדו כדי לגלות את <b>מארג המזון</b></p>

    <div class="container">
        <div id="scratch-container">
            <div id="underlay">
                <h2 class="text-xl font-bold text-green-900 mt-2">מארג מזון בטבע</h2>
                
                <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto max-h-[340px]">
                    <!-- Definitions for arrows -->
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orientation="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
                        </marker>
                    </defs>

                    <!-- Background & Producers -->
                    <rect x="0" y="200" width="200" height="40" fill="#f8fafc" />
                    
                    <!-- היצרנים (צמחים) -->
                    <g transform="translate(20, 180)"> <!-- עשב -->
                        <path d="M0,20 Q5,0 10,20 M5,20 Q10,5 15,20 M10,20 Q15,0 20,20" fill="none" stroke="#22c55e" stroke-width="2"/>
                        <text x="10" y="35" font-size="8" text-anchor="middle" fill="#166534">עשב</text>
                    </g>
                    
                    <g transform="translate(140, 170)"> <!-- שיח -->
                        <circle cx="15" cy="15" r="15" fill="#15803d" />
                        <text x="15" y="45" font-size="8" text-anchor="middle" fill="#166534">שיח</text>
                    </g>

                    <!-- צרכנים ראשוניים (אוכלי צמחים) -->
                    <g transform="translate(20, 100)"> <!-- חגב -->
                        <ellipse cx="15" cy="10" rx="12" ry="6" fill="#84cc16" />
                        <text x="15" y="25" font-size="8" text-anchor="middle" fill="#166534">חגב</text>
                    </g>

                    <g transform="translate(85, 120)"> <!-- ארנבת -->
                        <ellipse cx="15" cy="12" rx="15" ry="10" fill="#94a3b8" />
                        <path d="M10,5 L8,-5 M20,5 L22,-5" stroke="#94a3b8" stroke-width="3" />
                        <text x="15" y="35" font-size="8" text-anchor="middle" fill="#166534">ארנבת</text>
                    </g>

                    <!-- צרכנים משניים/טורפים -->
                    <g transform="translate(140, 70)"> <!-- לטאה -->
                        <path d="M0,15 Q15,0 30,15" fill="none" stroke="#65a30d" stroke-width="3" />
                        <text x="15" y="30" font-size="8" text-anchor="middle" fill="#166534">לטאה</text>
                    </g>

                    <g transform="translate(80, 20)"> <!-- נשר/טורף על -->
                        <path d="M0,10 Q15,-10 30,10" fill="none" stroke="#475569" stroke-width="3" />
                        <text x="15" y="25" font-size="8" text-anchor="middle" fill="#166534">נשר</text>
                    </g>

                    <!-- חיצי המארג (מי נאכל על ידי מי) -->
                    <line x1="35" y1="180" x2="35" y2="120" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                    <line x1="50" y1="185" x2="85" y2="145" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                    <line x1="145" y1="175" x2="115" y2="145" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                    <line x1="45" y1="105" x2="135" y2="85" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                    <line x1="150" y1="70" x2="110" y2="40" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                    <line x1="100" y1="120" x2="100" y2="50" stroke="#166534" stroke-width="1" marker-end="url(#arrowhead)" />
                </svg>

                <div class="bg-green-50 p-2 border-t border-green-100 w-full">
                    <p class="text-xs text-gray-800 leading-tight">
                        ב<b>מארג מזון</b>, כל יצור יכול להיות חלק ממספר שרשראות. 
                        החיצים מראים את כיוון זרימת האנרגיה.
                    </p>
                    <div id="secret-code-display">מילת הקוד: מארג מזון</div>
                </div>
            </div>
            <canvas id="scratch-canvas"></canvas>
        </div>
    </div>

    <div class="info-box" id="status-msg">
        השתמשו בעכבר או באצבע כדי לגרד!
    </div>

    <button onclick="resetCard()">נסו שוב</button>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.querySelector('.container');
        const secretCode = document.getElementById('secret-code-display');
        let isDrawing = false;
        let lastX, lastY;

        function init() {
            const w = container.offsetWidth;
            const h = container.offsetHeight;
            if (w === 0 || h === 0) {
                setTimeout(init, 100);
                return;
            }
            canvas.width = w;
            canvas.height = h;
            secretCode.style.display = 'none';

            ctx.globalCompositeOperation = 'source-over';
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#94a3b8');
            gradient.addColorStop(0.5, '#cbd5e1');
            gradient.addColorStop(1, '#94a3b8');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 800; i++) {
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.font = 'bold 28px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#475569';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('גרדו לגלות את המארג!', canvas.width / 2, canvas.height / 2);
            
            ctx.globalCompositeOperation = 'destination-out';
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function scratch(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const { x, y } = getCoords(e);
            ctx.lineWidth = 45;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x;
            lastY = y;
            if (Math.random() > 0.95) checkProgress();
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const { x, y } = getCoords(e);
            lastX = x; lastY = y;
        });
        canvas.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', () => { isDrawing = false; checkProgress(); });
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const { x, y } = getCoords(e);
            lastX = x; lastY = y;
        }, { passive: false });
        canvas.addEventListener('touchmove', scratch, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; checkProgress(); });

        function checkProgress() {
            if (canvas.width === 0) return;
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let clearPixels = 0;
                for (let i = 3; i < pixels.length; i += 64) {
                    if (pixels[i] === 0) clearPixels++;
                }
                const percentage = (clearPixels / (pixels.length / 64)) * 100;
                
                if (percentage > 40) {
                    document.getElementById('status-msg').innerHTML = "כל הכבוד! גלו עוד מהמארג...";
                    if (percentage > 75) {
                        document.getElementById('status-msg').innerHTML = "סיימתם! מילת הקוד התגלתה למטה.";
                        secretCode.style.display = 'block';
                        canvas.style.opacity = '0';
                        canvas.style.pointerEvents = 'none';
                        canvas.style.transition = 'opacity 1s';
                    }
                }
            } catch (e) {}
        }

        function resetCard() {
            canvas.style.opacity = '1';
            canvas.style.pointerEvents = 'auto';
            document.getElementById('status-msg').innerText = "השתמשו בעכבר או באצבע כדי לגרד!";
            init();
        }

        window.addEventListener('load', () => setTimeout(init, 100));
    </script>
</body>
</html>
